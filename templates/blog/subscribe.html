{% extends 'base.html' %}

{% block title %}Subscribe — CIPHER.{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 4rem auto 8rem auto; text-align: center;">
    
    <a href="{% url 'blog:home' %}" class="floating-back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return to Feed
    </a>
    
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-main)" stroke-width="1" style="margin-bottom: 2rem;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

    <h1 style="font-family: var(--font-heading); font-size: 3rem; margin-bottom: 1rem;">Join the Manifest.</h1>
    <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 3rem;">Enter your email to receive direct alerts the moment a new perspective is published to the platform.</p>

    <form action="{% url 'blog:subscribe' %}" method="POST" style="display: flex; flex-direction: column; gap: 1rem; max-width: 400px; margin: 0 auto;">
        {% csrf_token %}
        
        <input type="email" name="email" value="{{ user.email }}" placeholder="ENTER YOUR EMAIL" required style="background: transparent; border: none; border-bottom: 1px solid var(--accent-border); padding: 1rem 0; color: var(--text-main); font-family: inherit; font-size: 0.85rem; outline: none; letter-spacing: 1.5px; text-align: center;">
        
        <button type="submit" style="background: var(--text-main); color: var(--bg-color); border: none; padding: 1rem; font-family: inherit; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: background 0.3s ease; margin-top: 1rem;">
            Subscribe Now
        </button>
    </form>

</div>
{% endblock %}
