{% extends 'base.html' %}

{% block title %}Revision Protocol — CIPHER.{% endblock %}

{% block content %}
<style>
    /* Inherit the Dark Protocol drafting aesthetic */
    body { background-color: #0a0a0a; color: #fff; }
    .draft-container { max-width: 800px; margin: 0 auto 8rem auto; padding-top: 2rem; }
    .draft-header { margin-bottom: 3rem; border-bottom: 1px solid #222; padding-bottom: 2rem; }
    .draft-title-input { width: 100%; background: transparent; border: none; font-family: var(--font-heading); font-size: 3.5rem; color: #fff; outline: none; margin-bottom: 1rem; line-height: 1.1; }
    .draft-title-input::placeholder { color: #333; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
    .form-group { display: flex; flex-direction: column; }
    .form-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-gold); margin-bottom: 0.8rem; }
    .form-control { background: #111; border: 1px solid #222; padding: 1rem; color: #fff; font-family: var(--font-body); font-size: 0.85rem; outline: none; transition: border-color 0.3s ease; width: 100%; }
    .form-control:focus { border-color: var(--accent-gold); }
    .editor-box { width: 100%; min-height: 500px; background: #0a0a0a; border: none; border-left: 1px solid #222; padding: 0 1.5rem; color: #ccc; font-family: var(--font-body); font-size: 1.1rem; line-height: 1.8; outline: none; resize: vertical; margin-bottom: 3rem; }
    .editor-box:focus { border-left-color: var(--accent-gold); }
    .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
    .btn-upload { width: 100%; border: 1px dashed #444; color: #888; background: #111; padding: 1rem; font-family: var(--font-body); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s ease; text-align: left; }
    .file-upload-wrapper:hover .btn-upload { border-color: var(--accent-gold); color: var(--accent-gold); }
    .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
    .action-bar { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 2rem; }
    .btn-publish { background: var(--accent-gold); color: #fff; border: none; padding: 1rem 2.5rem; font-family: var(--font-body); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: filter 0.3s ease; }
    .btn-publish:hover { filter: brightness(1.2); }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; gap: 1.5rem; } .draft-title-input { font-size: 2.5rem; } .action-bar { flex-direction: column; gap: 1.5rem; align-items: flex-start; } .btn-publish { width: 100%; } }
</style>

<div class="draft-container">
    
    <a href="{% url 'blog:admin_dashboard' %}" class="floating-back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return to Command HQ
    </a>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="draft-header">
            <input type="text" name="title" class="draft-title-input" value="{{ post.title }}" required autocomplete="off">
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Classification Tags</label>
                    <input type="text" name="tags" class="form-control" value="{{ existing_tags }}" autocomplete="off">
                    <span style="font-size: 0.6rem; color: #555; margin-top: 5px;">Separate multiple tags with a comma.</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Update Intelligence (Image)</label>
                    <div class="file-upload-wrapper">
                        <button type="button" class="btn-upload">{% if post.cover_image %}Replace Current Cover{% else %}+ Select Cover File{% endif %}</button>
                        <input type="file" name="cover_image" accept="image/*">
                    </div>
                </div>
            </div>
        </div>

        <textarea name="content" class="editor-box" required>{{ post.content }}</textarea>

        <div class="action-bar">
            <div style="font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px;">
                ORIGINAL AUTHOR: <span style="color: #fff;">{{ post.author.username }}</span>
            </div>
            <button type="submit" class="btn-publish">Commit Revisions</button>
        </div>
    </form>
</div>

<script>
    const fileInput = document.querySelector('input[type="file"]');
    const btnUpload = document.querySelector('.btn-upload');

    fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            btnUpload.textContent = 'File Queued: ' + this.files[0].name;
            btnUpload.style.borderColor = 'var(--accent-gold)';
            btnUpload.style.color = 'var(--accent-gold)';
        }
    });
</script>
{% endblock %}
